name: Mini-ML CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build & Test on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name:  Pobranie kodu repozytorium
        uses: actions/checkout@v4

      - name:  Konfiguracja środowiska Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name:  Instalacja kompilatora i CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Instalacja zależności Python
        run: |
          python -m pip install --upgrade pip
          # Instalujemy pytest, pybind11 i pandas do czytania CSV
          python -m pip install pytest pybind11 pandas numpy

      - name: ️ Kompilacja biblioteki C++ i instalacja miniml
        run: |
          # Buduje kod i udostępnia moduł Pythonowi
          python -m pip install -e .

      - name:  Odpalenie testów
        run: |
          # Używamy python -m pytest, żeby ładnie rozwiązał ścieżki
          python -m pytest